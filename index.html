    <!-- Script Operations for Accordions, Menu Drawer & Clipboard Actions -->
    <script>
      function toggleAccordion(id) {
        const content = document.getElementById(id);
        const icon = document.getElementById('icon-' + id);
        
        // Check if this accordion is already open
        const isOpen = content.classList.contains('open');
        
        // First, close ALL accordions and reset ALL icons safely
        document.querySelectorAll('.accordion-content').forEach(item => {
          item.classList.remove('open');
          item.style.maxHeight = '0px';
        });
        document.querySelectorAll('[id^="icon-acc-"]').forEach(ic => {
          if (ic) ic.style.transform = 'rotate(0deg)';
        });
        
        // If it wasn't open, open it now cleanly
        if (!isOpen) {
          content.classList.add('open');
          content.style.maxHeight = '1000px';
          if (icon) icon.style.transform = 'rotate(180deg)';
        }
      }

      function toggleMobileMenu() {
        const drawer = document.getElementById('mobile-menu-drawer');
        const backdrop = document.getElementById('drawer-backdrop');
        
        if (drawer.classList.contains('translate-x-full')) {
          drawer.classList.remove('translate-x-full');
          backdrop.classList.remove('hidden');
          setTimeout(() => backdrop.classList.add('opacity-100'), 10);
        } else {
          drawer.classList.add('translate-x-full');
          backdrop.classList.remove('opacity-100');
          setTimeout(() => backdrop.classList.add('hidden'), 300);
        }
      }

      function copyHandle(textToCopy, btnId) {
        const tempTextArea = document.createElement("textarea");
        tempTextArea.value = textToCopy;
        document.body.appendChild(tempTextArea);
        tempTextArea.select();
        try {
          document.execCommand("copy");
          const targetBtn = document.getElementById(btnId);
          const originalText = targetBtn.innerText;
          targetBtn.innerText = "Copied! ✓";
          targetBtn.style.color = "#22c55e"; 
          setTimeout(() => { 
            targetBtn.innerText = originalText; 
            targetBtn.style.color = "";
          }, 2000);
        } catch (err) { 
          console.error("Copy failed", err); 
        }
        document.body.removeChild(tempTextArea);
      }

      window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
      formspree('initForm', { formElement: '#study-contact-form-inner', formId: 'mdarwozb' });
    </script>
